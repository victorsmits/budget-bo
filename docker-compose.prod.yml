x-rq-worker-env: &rq_worker_env
  ENVIRONMENT: production
  DJANGO_SETTINGS_MODULE: config.settings.production
  DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@budget-bo-postgres-prod:5432/${POSTGRES_DB:-budgetbo}
  REDIS_URL: redis://budget-bo-redis-prod:6379/0
  SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
  ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
  GEMINI_API_KEY: ${GEMINI_API_KEY:?GEMINI_API_KEY is required}
  GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
  GEMINI_MAX_BATCH_SIZE: ${GEMINI_MAX_BATCH_SIZE:-50}
  GEMINI_DAILY_LIMIT: ${GEMINI_DAILY_LIMIT:-18}
  GEMINI_MIN_DELAY_SECONDS: ${GEMINI_MIN_DELAY_SECONDS:-12}

x-rq-worker-base: &rq_worker_base
  image: ${DOCKERHUB_NAMESPACE:?DOCKERHUB_NAMESPACE is required}/budget-bo-backend:${IMAGE_TAG:-latest}
  restart: unless-stopped
  command: python manage.py rqworker --worker-class ${RQ_WORKER_CLASS:-rq.SimpleWorker} sync enrich default
  environment: *rq_worker_env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    backend:
      condition: service_started
  networks:
    - budget-bo-network

services:
  postgres:
    image: postgres:16-alpine
    container_name: budget-bo-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-budgetbo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - budget-bo-network

  redis:
    image: redis:7-alpine
    container_name: budget-bo-redis-prod
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - budget-bo-network

  backend:
    image: ${DOCKERHUB_NAMESPACE:?DOCKERHUB_NAMESPACE is required}/budget-bo-backend:${IMAGE_TAG:-latest}
    container_name: budget-bo-backend-prod
    restart: unless-stopped
    environment:
      ENVIRONMENT: production
      DJANGO_SETTINGS_MODULE: config.settings.production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@budget-bo-postgres-prod:5432/${POSTGRES_DB:-budgetbo}
      REDIS_URL: redis://budget-bo-redis-prod:6379/0
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?GOOGLE_CLIENT_ID is required}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:?GOOGLE_CLIENT_SECRET is required}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
      GEMINI_API_KEY: ${GEMINI_API_KEY:?GEMINI_API_KEY is required}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      GEMINI_MAX_BATCH_SIZE: ${GEMINI_MAX_BATCH_SIZE:-50}
      GEMINI_DAILY_LIMIT: ${GEMINI_DAILY_LIMIT:-18}
      GEMINI_MIN_DELAY_SECONDS: ${GEMINI_MIN_DELAY_SECONDS:-12}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
    command: >
      sh -c "python manage.py migrate &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers ${GUNICORN_WORKERS:-3} --timeout ${GUNICORN_TIMEOUT:-120}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/admin/login/"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - budget-bo-network

  rq-scheduler:
    image: ${DOCKERHUB_NAMESPACE:?DOCKERHUB_NAMESPACE is required}/budget-bo-backend:${IMAGE_TAG:-latest}
    container_name: budget-bo-rq-scheduler-prod
    restart: unless-stopped
    command: >
      sh -c "python manage.py ensure_rq_schedules &&
             python manage.py rqscheduler"
    environment:
      <<: *rq_worker_env
      SYNC_INTERVAL_SECONDS: ${SYNC_INTERVAL_SECONDS:-3600}
      SYNC_DAYS_BACK: ${SYNC_DAYS_BACK:-1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - budget-bo-network

  rq-worker:
    <<: *rq_worker_base
    deploy:
      mode: replicated
      replicas: ${RQ_WORKER_REPLICAS:-3}

  mcp-server:
    image: ${DOCKERHUB_NAMESPACE:?DOCKERHUB_NAMESPACE is required}/budget-bo-backend:${IMAGE_TAG:-latest}
    container_name: budget-bo-mcp-server-prod
    restart: unless-stopped
    command: python mcp_server.py --host 0.0.0.0 --port 8808
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@budget-bo-postgres-prod:5432/${POSTGRES_DB:-budgetbo}
      REDIS_URL: redis://budget-bo-redis-prod:6379/0
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      DJANGO_ALLOW_ASYNC_UNSAFE: "true"
      MCP_TRANSPORT: ${MCP_TRANSPORT:-streamable-http}
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8808"
    ports:
      - "8808:8808"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - budget-bo-network

  frontend:
    image: ${DOCKERHUB_NAMESPACE:?DOCKERHUB_NAMESPACE is required}/budget-bo-frontend:${IMAGE_TAG:-latest}
    container_name: budget-bo-frontend-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8000}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?GOOGLE_CLIENT_ID is required}
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - budget-bo-network

volumes:
  postgres_data:
  redis_data:

networks:
  budget-bo-network:
