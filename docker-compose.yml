 services:
  postgres:
    image: postgres:16-alpine
    container_name: budget-bo-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-budgetbo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-budgetbo_secret}
      POSTGRES_DB: ${POSTGRES_DB:-budgetbo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks: [budget-bo-network]

  redis:
    image: redis:7-alpine
    container_name: budget-bo-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks: [budget-bo-network]

  backend:
    build: ./backend
    container_name: budget-bo-backend
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - DATABASE_URL=postgresql://${POSTGRES_USER:-budgetbo}:${POSTGRES_PASSWORD:-budgetbo_secret}@postgres:5432/${POSTGRES_DB:-budgetbo}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change_me_in_production_please}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-generate_a_32_byte_key_}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      - GEMINI_MAX_BATCH_SIZE=${GEMINI_MAX_BATCH_SIZE:-50}
      - GEMINI_DAILY_LIMIT=${GEMINI_DAILY_LIMIT:-18}
      - GEMINI_MIN_DELAY_SECONDS=${GEMINI_MIN_DELAY_SECONDS:-12}
    ports: ["8000:8000"]
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [budget-bo-network]

  sync-scheduler:
    build: ./backend
    container_name: budget-bo-sync-scheduler
    command: >
      sh -c "while true; do
             python manage.py sync_credentials --days-back ${SYNC_DAYS_BACK:-1};
             sleep ${SYNC_INTERVAL_SECONDS:-3600};
           done"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - DATABASE_URL=postgresql://${POSTGRES_USER:-budgetbo}:${POSTGRES_PASSWORD:-budgetbo_secret}@postgres:5432/${POSTGRES_DB:-budgetbo}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change_me_in_production_please}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-generate_a_32_byte_key_}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      - GEMINI_MAX_BATCH_SIZE=${GEMINI_MAX_BATCH_SIZE:-50}
      - GEMINI_DAILY_LIMIT=${GEMINI_DAILY_LIMIT:-18}
      - GEMINI_MIN_DELAY_SECONDS=${GEMINI_MIN_DELAY_SECONDS:-12}
      - SYNC_INTERVAL_SECONDS=${SYNC_INTERVAL_SECONDS:-3600}
      - SYNC_DAYS_BACK=${SYNC_DAYS_BACK:-1}
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks: [budget-bo-network]

  rq-worker:
    build: ./backend
    container_name: budget-bo-rq-worker
    command: python manage.py rqworker --worker-class ${RQ_WORKER_CLASS:-rq.SimpleWorker} sync enrich default
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - DATABASE_URL=postgresql://${POSTGRES_USER:-budgetbo}:${POSTGRES_PASSWORD:-budgetbo_secret}@postgres:5432/${POSTGRES_DB:-budgetbo}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change_me_in_production_please}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-generate_a_32_byte_key_}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      - GEMINI_MAX_BATCH_SIZE=${GEMINI_MAX_BATCH_SIZE:-50}
      - GEMINI_DAILY_LIMIT=${GEMINI_DAILY_LIMIT:-18}
      - GEMINI_MIN_DELAY_SECONDS=${GEMINI_MIN_DELAY_SECONDS:-12}
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [budget-bo-network]

 volumes:
  postgres_data:
  redis_data:

 networks:
  budget-bo-network:
    driver: bridge
